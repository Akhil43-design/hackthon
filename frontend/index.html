<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>InternHub Dashboard</title>
    <link href="/static/css/tailwind.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        body {
            min-height: max(884px, 100dvh);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div
        class="relative flex min-h-screen w-full flex-col max-w-[1000px] mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
        <!-- Header -->
        <header
            class="sticky top-0 z-50 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-slate-200 dark:border-slate-800">
            <div class="flex items-center gap-3">
                <div class="size-10 overflow-hidden rounded-full border border-slate-200 dark:border-slate-700">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random"
                        class="h-full w-full object-cover">
                </div>
                <div class="flex-1">
                    <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wider">InternHub</p>
                    <h2 id="userName" class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight">
                        Welcome</h2>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="post-internship.html"
                    class="flex items-center gap-1 bg-accent text-white px-3 py-1.5 rounded-full text-xs font-bold hover:scale-105 transition-all">
                    <span class="material-symbols-outlined text-sm">add</span> Post
                </a>
                <button id="authBtn"
                    class="flex h-10 px-4 items-center justify-center rounded-full bg-primary text-white text-xs font-bold">Sign
                    In</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto pb-24">
            <!-- Recommended Section -->
            <section class="mt-6">
                <div class="px-4 mb-4">
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">Recommended For You
                    </h2>
                </div>
                <div id="recommendationContainer"
                    class="flex overflow-x-auto gap-4 px-4 pb-2 no-scrollbar scroll-smooth">
                    <!-- Dynamic Recommendation Cards Loading Here -->
                </div>
            </section>

            <!-- All Internships Section -->
            <section class="mt-8">
                <div class="flex items-center justify-between px-4 mb-4">
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">Latest Internships
                    </h2>
                    <span class="material-symbols-outlined text-slate-400">explore</span>
                </div>
                <div id="internshipContainer" class="px-4 space-y-4">
                    <!-- Dynamic Internship Cards Loading Here -->
                </div>
            </section>

            <!-- Tech News -->
            <section class="mt-8 mb-6">
                <div class="flex items-center justify-between px-4 mb-4">
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">Tech News</h2>
                    <span class="material-symbols-outlined text-slate-400">newspaper</span>
                </div>
                <div id="newsContainer" class="px-4 space-y-4">
                    <!-- Dynamic News Items Loading Here -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav
            class="fixed bottom-0 left-0 right-0 z-50 max-w-[1000px] mx-auto bg-white/90 dark:bg-background-dark/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-6 pb-6 pt-3">
            <div class="flex items-center justify-between">
                <a class="flex flex-col items-center gap-1 text-primary" href="index.html">
                    <span class="material-symbols-outlined fill-icon">home</span>
                    <span class="text-[10px] font-bold">Home</span>
                </a>
                <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                    <span class="material-symbols-outlined">explore</span>
                    <span class="text-[10px] font-medium">Explore</span>
                </a>
                <a class="flex flex-col items-center gap-1 text-slate-400" href="bookmarks.html">
                    <span class="material-symbols-outlined">bookmark</span>
                    <span class="text-[10px] font-medium">Saved</span>
                </a>
                <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                    <span class="material-symbols-outlined">person</span>
                    <span class="text-[10px] font-medium">Profile</span>
                </a>
            </div>
        </nav>
    </div>

    <script type="module" src="/static/js/main.js"></script>
</body>

</html>
