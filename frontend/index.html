<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>InternHub Dashboard</title>
    <link href="/static/css/tailwind.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        body {
            min-height: max(884px, 100dvh);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div
        class="relative flex min-h-screen w-full flex-col max-w-[430px] mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
        <!-- Header -->
        <header
            class="sticky top-0 z-50 flex items-center bg-white p-4 justify-between border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-2">
                <div class="size-8 bg-primary rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-lg">auto_awesome</span>
                </div>
                <h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold">AI Intern</h1>
            </div>
            <button id="authBtn" class="text-primary font-semibold text-sm">Sign In</button>
        </header>

        <!-- Category Tabs -->
        <div
            class="flex bg-white dark:bg-slate-900 px-4 border-b border-slate-100 dark:border-slate-800 overflow-x-auto no-scrollbar">
            <button
                class="px-4 py-3 text-primary border-b-2 border-primary font-bold text-sm whitespace-nowrap">Home</button>
            <button class="px-4 py-3 text-slate-500 font-semibold text-sm whitespace-nowrap">Internships</button>
            <button class="px-4 py-3 text-slate-500 font-semibold text-sm whitespace-nowrap">Tech News</button>
        </div>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto pb-24 space-y-8 py-6">
            <!-- Tech News Section -->
            <section>
                <div class="flex items-center justify-between px-6 mb-4">
                    <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Latest Tech News</h2>
                    <button class="text-primary text-[10px] font-bold uppercase tracking-wider">See All</button>
                </div>
                <div id="newsContainer" class="flex overflow-x-auto gap-4 px-6 pb-2 no-scrollbar snap-x snap-mandatory">
                    <!-- Dynamic News Cards Loading Here -->
                </div>
            </section>

            <!-- Trending Internships Section -->
            <section>
                <div class="flex items-center justify-between px-6 mb-4">
                    <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Trending Internships</h2>
                    <button class="text-primary text-[10px] font-bold uppercase tracking-wider">Explore</button>
                </div>
                <div id="internshipContainer"
                    class="flex overflow-x-auto gap-4 px-6 pb-2 no-scrollbar snap-x snap-mandatory">
                    <!-- Dynamic Internship Cards Loading Here -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation Bar -->
        <nav
            class="fixed bottom-0 left-0 right-0 z-50 max-w-[430px] mx-auto bg-white border-t border-slate-100 dark:border-slate-800 px-6 py-4 flex items-center justify-between">
            <a class="flex flex-col items-center gap-1 text-primary" href="index.html">
                <span class="material-symbols-outlined fill-icon" style="font-variation-settings: 'FILL' 1;">home</span>
                <span class="text-[10px] font-bold">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">work</span>
                <span class="text-[10px] font-medium">Interns</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">newspaper</span>
                <span class="text-[10px] font-medium">News</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </nav>
    </div>

    <script type="module" src="/static/js/main.js"></script>
</body>

</html>
