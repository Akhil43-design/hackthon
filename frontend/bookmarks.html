<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Saved Internships - InternHub</title>
    <link href="/static/css/tailwind.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0"
        rel="stylesheet" />
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div
        class="relative flex min-h-screen w-full flex-col max-w-[1000px] mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
        <header
            class="sticky top-0 z-50 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-slate-200 dark:border-slate-800">
            <div onclick="window.history.back()"
                class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer">
                <span class="material-symbols-outlined">arrow_back</span>
            </div>
            <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold flex-1 text-center">Saved Internships</h2>
            <div class="w-10"></div>
        </header>

        <main class="flex-1 p-4">
            <div id="savedContainer" class="space-y-4">
                <p class="text-center p-10 text-slate-500">Loading your bookmarks...</p>
            </div>
        </main>

        <nav
            class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 z-50 px-4 pb-safe pt-2 shadow-2xl">
            <div class="flex justify-around items-center h-16">
                <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-all"
                    href="index.html">
                    <span class="material-symbols-outlined">home</span>
                    <span class="text-[10px] font-bold">Home</span>
                </a>
                <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-all"
                    href="index.html">
                    <span class="material-symbols-outlined">work</span>
                    <span class="text-[10px] font-bold">Internships</span>
                </a>
                <a class="flex flex-col items-center gap-1 text-primary transition-all scale-110" href="bookmarks.html">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bookmark</span>
                    <span class="text-[10px] font-bold">Saved</span>
                </a>
                <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-all"
                    href="login.html">
                    <span class="material-symbols-outlined">person</span>
                    <span class="text-[10px] font-bold">Profile</span>
                </a>
            </div>
        </nav>
    </div>

    <script type="module">
        import { db } from "/firebase_config/config.js?v=3";
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Manual Session Check
        const savedUser = localStorage.getItem('user');
        if (!savedUser) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(savedUser);
            const container = document.getElementById('savedContainer');

            async function loadBookmarks() {
                try {
                    const bookmarksRef = collection(db, `users/${user.id}/bookmarks`);
                    const q = query(bookmarksRef, orderBy("savedAt", "desc"));
                    const querySnapshot = await getDocs(q);

                    if (querySnapshot.empty) {
                        container.innerHTML = `
                            <div class="text-center p-10">
                                <span class="material-symbols-outlined text-6xl text-slate-200">bookmark_border</span>
                                <p class="text-slate-500 mt-4">You haven't saved any internships yet.</p>
                                <a href="index.html" class="inline-block mt-4 text-primary font-bold">Browse Opportunities</a>
                            </div>
                        `;
                        return;
                    }

                    container.innerHTML = querySnapshot.docs.map(doc => {
                        const intern = doc.data();
                        return `
                            <div class="flex items-center gap-4 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-all cursor-pointer" 
                                 onclick="window.location.href='details.html?data=${encodeURIComponent(JSON.stringify(intern))}'">
                                <div class="size-12 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden">
                                    <img src="https://ui-avatars.com/api/?name=${intern.company}&background=random" class="w-8 h-8 object-contain">
                                </div>
                                <div class="flex-1">
                                    <h4 class="text-slate-900 dark:text-slate-100 font-bold text-sm uppercase">${intern.title}</h4>
                                    <p class="text-slate-500 dark:text-slate-400 text-xs">${intern.company} • ${intern.location}</p>
                                </div>
                                <div class="text-right">
                                    <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">bookmark</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                } catch (error) {
                    console.error("Error loading bookmarks:", error);
                    container.innerHTML = '<p class="text-red-500 text-center">Failed to load saved internships. Check your database permissions.</p>';
                }
            }

            loadBookmarks();
        }
    </script>
</body>

</html>
