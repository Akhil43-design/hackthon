<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>User Registration - InternHub</title>
    <link href="/static/css/tailwind.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div
        class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
        <!-- Top Navigation -->
        <div
            class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
            <a href="/" class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h2
                class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">
                Sign Up</h2>
        </div>

        <!-- Form Content -->
        <div class="flex flex-col gap-6 p-4 max-w-md mx-auto w-full">
            <header class="text-center py-4">
                <h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Join InternHub</h3>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Get matched with AI-powered internship opportunities.
                </p>
            </header>

            <form id="signupForm" class="space-y-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Full Name</label>
                    <input id="name" required
                        class="flex w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-slate-900 dark:text-slate-100 transition-all"
                        placeholder="John Doe" type="text" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Email Address</label>
                    <input id="email" required
                        class="flex w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-slate-900 dark:text-slate-100 transition-all"
                        placeholder="john@university.edu" type="email" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Password</label>
                    <input id="password" required minlength="6"
                        class="flex w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-slate-900 dark:text-slate-100 transition-all"
                        placeholder="Min. 6 characters" type="password" />
                </div>

                <div class="pt-6 pb-12">
                    <button type="submit"
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                        Create Account
                    </button>
                    <div id="errorMsg" class="text-red-500 text-xs text-center mt-4 hidden"></div>
                    <p class="text-center text-xs text-slate-500 dark:text-slate-400 mt-4">
                        Already have an account? <a href="login.html" class="text-primary font-bold">Sign In</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "/firebase_config/config.js";
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const signupForm = document.getElementById('signupForm');
        const errorEl = document.getElementById('errorMsg');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save profile to Firestore
                console.log("Saving user profile to Firestore...");
                await setDoc(doc(db, "users", user.uid), {
                    name: name,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                window.location.href = 'index.html';
            } catch (error) {
                console.error("Signup Error Object:", error);
                errorEl.innerText = error.message;
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
