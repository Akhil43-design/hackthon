<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InternHub</title>
    <link href="/static/css/tailwind.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0"
        rel="stylesheet" />
    <style>
        .auth-container {
            max-width: 400px;
            margin: 6rem auto;
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--secondary);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">InternHub</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <div class="auth-container">
        <h2 style="margin-bottom: 0.5rem; text-align: center;">Welcome Back</h2>
        <p style="color: var(--secondary); margin-bottom: 2rem; font-size: 0.9rem; text-align: center;">Log in to access
            your recommendations.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--secondary);">
            Don't have an account? <a href="signup.html"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a>
        </p>
    </div>

    <script type="module">
        import { db } from "/firebase_config/config.js?v=3";
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('loginBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Checking Credentials...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Manual match query
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("email", "==", email), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    throw new Error("Invalid email or password.");
                }

                // Get first matching doc
                const userDoc = querySnapshot.docs[0];
                const userData = userDoc.data();

                // Store simplified session in localStorage
                localStorage.setItem('user', JSON.stringify({
                    id: userDoc.id,
                    email: userData.email,
                    name: userData.name
                }));

                window.location.href = 'index.html';
            } catch (error) {
                console.error("Login error:", error);
                alert("Login failed: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign In";
            }
        });
    </script>
</body>

</html>
