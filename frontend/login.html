<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InternHub</title>
    <link href="/static/css/tailwind.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0"
        rel="stylesheet" />
    <style>
        :root {
            --primary: #6366f1;
            --background-light: #f8fafc;
            --background-dark: #0f172a;
        }

        body {
            background: radial-gradient(circle at top right, #f8fafc, #f1f5f9);
            min-height: 100vh;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .auth-card {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>

<body>
    <nav
        class="sticky top-0 z-50 w-full bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <span class="material-symbols-outlined text-primary text-3xl">bolt</span>
                    <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">InternHub</span>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center gap-8">
                    <a class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                        href="index.html">Home</a>
                    <a class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                        href="internships.html">Internships</a>
                    <a class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                        href="news.html">Tech News</a>
                    <a class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                        href="bookmarks.html">Saved</a>
                </div>
                <div class="w-10"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 flex flex-col items-center">
        <div
            class="auth-card w-full max-w-md bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-3">Welcome Back</h2>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Log in to your professional workspace.</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Email
                        Address</label>
                    <input type="email" id="email" required placeholder="name@university.edu"
                        class="w-full h-14 px-6 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-slate-900 outline-none transition-all text-slate-900 dark:text-white font-medium">
                </div>
                <div class="space-y-2">
                    <label
                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full h-14 px-6 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-slate-900 outline-none transition-all text-slate-900 dark:text-white font-medium">
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full h-14 bg-primary text-white rounded-2xl font-bold text-lg shadow-lg shadow-primary/25 hover:bg-primary/90 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4">
                    Sign In
                    <span class="material-symbols-outlined">login</span>
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-slate-50 dark:border-slate-800 text-center">
                <p class="text-slate-500 dark:text-slate-400 font-medium">
                    Don't have an account?
                    <a href="signup.html" class="text-primary font-bold hover:underline ml-1 text-lg">Create one now</a>
                </p>
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from "/firebase_config/config.js?v=3";
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // If already logged in, redirect home
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('loginBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Checking Credentials...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Manual match query
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("email", "==", email), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    throw new Error("Invalid email or password.");
                }

                // Get first matching doc
                const userDoc = querySnapshot.docs[0];
                const userData = userDoc.data();

                // Store simplified session in localStorage
                localStorage.setItem('user', JSON.stringify({
                    id: userDoc.id,
                    email: userData.email,
                    name: userData.name
                }));

                window.location.href = 'index.html';
            } catch (error) {
                console.error("Login error:", error);
                alert("Login failed: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign In";
            }
        });
    </script>
</body>

</html>
