<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Internship Board - InternAI</title>
    <link href="/static/css/tailwind.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0"
        rel="stylesheet" />
    <style>
        .filter-btn.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(43, 108, 238, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <nav
        class="sticky top-0 z-50 w-full bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <span class="material-symbols-outlined text-primary text-3xl">bolt</span>
                    <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">InternAI</span>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center gap-8">
                    <a class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                        href="index.html">Home</a>
                    <a class="text-sm font-semibold text-primary" href="internships.html">Internships</a>
                    <a class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                        href="news.html">Tech News</a>
                    <a class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                        href="bookmarks.html">Saved</a>
                </div>
                <div class="flex items-center gap-4">
                    <button id="authBtn"
                        class="bg-primary text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-primary/90 transition-all shadow-md shadow-primary/20">
                        Sign In
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-12">
        <!-- Header Section -->
        <section class="text-center space-y-4">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white">Internship Board</h1>
            <p class="text-lg text-slate-500 dark:text-slate-400 max-w-2xl mx-auto">Explore premium opportunities
                curated just for you. Filter by domain or search to find your next career step.</p>
        </section>

        <!-- Search & Filter Section -->
        <section class="space-y-6">
            <div class="relative max-w-2xl mx-auto">
                <span
                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input type="text" id="searchInput" placeholder="Search by role, company, or skills..."
                    class="w-full h-14 pl-12 pr-4 rounded-2xl border-none bg-white dark:bg-slate-900 shadow-xl shadow-slate-200/50 dark:shadow-none focus:ring-2 focus:ring-primary transition-all text-slate-700 dark:text-slate-200">
            </div>

            <div class="flex items-center justify-center gap-2 overflow-x-auto no-scrollbar py-2">
                <button
                    class="filter-btn active px-6 py-2.5 rounded-full bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 text-sm font-bold border border-slate-100 dark:border-slate-800 hover:border-primary transition-all whitespace-nowrap"
                    data-domain="all">All</button>
                <button
                    class="filter-btn px-6 py-2.5 rounded-full bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 text-sm font-bold border border-slate-100 dark:border-slate-800 hover:border-primary transition-all whitespace-nowrap"
                    data-domain="Software">Software</button>
                <button
                    class="filter-btn px-6 py-2.5 rounded-full bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 text-sm font-bold border border-slate-100 dark:border-slate-800 hover:border-primary transition-all whitespace-nowrap"
                    data-domain="AI">AI/ML</button>
                <button
                    class="filter-btn px-6 py-2.5 rounded-full bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 text-sm font-bold border border-slate-100 dark:border-slate-800 hover:border-primary transition-all whitespace-nowrap"
                    data-domain="Design">Design</button>
                <button
                    class="filter-btn px-6 py-2.5 rounded-full bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 text-sm font-bold border border-slate-100 dark:border-slate-800 hover:border-primary transition-all whitespace-nowrap"
                    data-domain="Web">Web Dev</button>
                <button
                    class="filter-btn px-6 py-2.5 rounded-full bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 text-sm font-bold border border-slate-100 dark:border-slate-800 hover:border-primary transition-all whitespace-nowrap"
                    data-domain="Marketing">Marketing</button>
            </div>
        </section>

        <!-- Listings Grid -->
        <section id="internshipsSection">
            <div id="internshipContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20">
                <!-- Dynamic Content -->
            </div>
        </section>
    </main>

    <!-- Mobile Navigation -->
    <div
        class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 md:hidden z-50 px-4 pb-safe pt-2 shadow-2xl">
        <div class="flex justify-around items-center h-16">
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-all"
                href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary transition-all scale-110" href="internships.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">work</span>
                <span class="text-[10px] font-bold">Internships</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-all"
                href="news.html">
                <span class="material-symbols-outlined">article</span>
                <span class="text-[10px] font-bold">News</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-all"
                href="bookmarks.html">
                <span class="material-symbols-outlined">bookmark</span>
                <span class="text-[10px] font-bold">Saved</span>
            </a>
        </div>
    </div>

    <!-- Re-use main.js for core logic -->
    <script type="module" src="/static/js/main.js?v=3"></script>
</body>

</html>
